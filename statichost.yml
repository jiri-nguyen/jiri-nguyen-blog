# Docker image for build (linux/amd64)
image: rust:1.85-slim

# Build command: fetch Tailwind CLI, then run the Rust generator from the website directory
command: >
  apt-get update &&
  apt-get install -y curl &&
  rm -rf /var/lib/apt/lists/* &&
  cd website &&
  curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o tailwindcss &&
  chmod +x tailwindcss &&
  cargo run --release

# Publish the generated static site
public: website/dist
